<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagan Bari Seeds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-green-600 text-white py-4 text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-2xl font-bold">Bagan Bari Seeds</h1>
    </header>

    <!-- Main Hero Image -->
    <div class="max-w-3xl mx-auto p-4">
        <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=800" class="w-full rounded-2xl shadow-lg mb-6">
        
        <!-- Slider -->
        <div class="swiper mySwiper mb-6">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1592150621344-824545996a67?w=400" class="rounded-xl"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=400" class="rounded-xl"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1591857177580-dc82b9ac4e17?w=400" class="rounded-xl"></div>
            </div>
        </div>

        <!-- Product Details -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-green-100 mb-6">
            <h2 class="text-2xl font-bold text-green-700">প্রিমিয়াম সবজি বীজ কম্বো</h2>
            <p class="text-gray-600 mt-2">আমাদের স্পেশাল প্যাকেজে পাচ্ছেন ১০ ধরণের উন্নত জাতের বীজ যা আপনার ছাদ বাগানের জন্য সেরা।</p>
            <div class="text-xl font-bold text-orange-600 mt-3">মূল্য: ৪৯৯ টাকা</div>
        </div>

        <!-- Order Form -->
        <form id="orderForm" class="bg-white p-6 rounded-2xl shadow-lg border-2 border-green-500">
            <h3 class="text-xl font-bold mb-4 text-center text-green-800">অর্ডার করতে নিচের তথ্য দিন</h3>
            <div class="space-y-4">
                <input type="text" id="name" placeholder="আপনার নাম" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                <input type="tel" id="phone" placeholder="মোবাইল নাম্বার" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                <textarea id="address" placeholder="পুরো ঠিকানা" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500"></textarea>
                
                <!-- Universal Quantity Picker -->
                <div class="flex items-center justify-between bg-gray-100 p-3 rounded-lg">
                    <span class="font-bold">পরিমাণ:</span>
                    <div class="flex items-center space-x-4">
                        <button type="button" onclick="changeQty(-1)" class="bg-red-500 text-white px-3 py-1 rounded-full text-xl font-bold">-</button>
                        <span id="qtyDisplay" class="text-xl font-bold">1</span>
                        <button type="button" onclick="changeQty(1)" class="bg-green-500 text-white px-3 py-1 rounded-full text-xl font-bold">+</button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg hover:bg-green-700 transition transform active:scale-95">
                    অর্ডার কনফার্ম করুন
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Quantity Logic
      // ... আগের index.html এর বাকি কোড ঠিক থাকবে, শুধু স্ক্রিপ্ট অংশটি নিচের মতো হবে ...

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "অর্ডার প্রসেস হচ্ছে...";

            const data = {
                action: "add", // নতুন অর্ডার অ্যাকশন
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                quantity: quantity
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("ধন্যবাদ! আপনার অর্ডারটি সফল হয়েছে।");
                location.reload();
            }).catch(err => alert("ত্রুটি হয়েছে!"));
        });
    </script>
</body>
</html>
