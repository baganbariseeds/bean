<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bagan Bari Seeds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">অর্ডার ম্যানেজমেন্ট</h1>
            <button onclick="fetchOrders()" class="bg-blue-600 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-700">রিফ্রেশ করুন</button>
        </div>
        
        <div class="bg-white rounded-xl shadow-lg overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-green-700 text-white">
                    <tr>
                        <th class="p-4">তারিখ</th>
                        <th class="p-4">ক্রেতার তথ্য</th>
                        <th class="p-4">ঠিকানা</th>
                        <th class="p-4 text-center">পরিমাণ</th>
                        <th class="p-4">স্ট্যাটাস</th>
                        <th class="p-4 text-center">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="6" class="p-10 text-center">লোডিং হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'আপনার_গুগল_অ্যাপস_স্ক্রিপ্ট_URL_এখানে_দিন';

        async function fetchOrders() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                alert("ডাটা লোড করতে সমস্যা হয়েছে!");
            }
        }

        function renderTable(orders) {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = "";
            
            orders.reverse().forEach(order => {
                const isSent = order.status === "পাঠানো হয়েছে";
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition ${isSent ? 'bg-green-50' : ''}">
                        <td class="p-4 text-xs text-gray-500">${new Date(order.date).toLocaleDateString('bn-BD')}</td>
                        <td class="p-4">
                            <div class="font-bold text-gray-800">${order.name}</div>
                            <div class="text-blue-600 font-semibold">${order.phone}</div>
                        </td>
                        <td class="p-4 text-sm text-gray-600">${order.address}</td>
                        <td class="p-4 text-center font-bold">${order.quantity}</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${isSent ? 'bg-green-200 text-green-800' : 'bg-yellow-200 text-yellow-800'}">
                                ${order.status}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            ${!isSent ? `
                                <button onclick="markAsSent(${order.rowIndex})" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">
                                    পাঠানো হয়েছে?
                                </button>
                            ` : `<span class="text-green-600 font-bold">✓ সম্পন্ন</span>`}
                        </td>
                    </tr>
                `;
            });
        }

        async function markAsSent(index) {
            if(!confirm("আপনি কি নিশ্চিত যে অর্ডারটি পাঠানো হয়েছে?")) return;

            // বাটনে ক্লিক করলে সাময়িকভাবে টেক্সট পরিবর্তন
            event.target.innerText = "আপডেট হচ্ছে...";
            event.target.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "update", rowIndex: index })
                });
                // যেহেতু no-cors মোড, তাই আমরা সরাসরি সাকসেস ধরে নিয়ে ডাটা আবার রিফ্রেশ করবো
                setTimeout(fetchOrders, 2000); 
            } catch (error) {
                alert("আপডেট করা যায়নি!");
                fetchOrders();
            }
        }

        fetchOrders();
    </script>
</body>
</html>
