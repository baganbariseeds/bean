<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin - Bagan Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">অর্ডার ড্যাশবোর্ড</h1>
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-4">ক্রেতা/জেলা</th>
                        <th class="p-4">ঠিকানা</th>
                        <th class="p-4">পণ্য তথ্য</th>
                        <th class="p-4">ডেলিভারি ফি</th>
                        <th class="p-4 font-bold text-yellow-400">মোট টাকা</th>
                        <th class="p-4">স্ট্যাটাস</th>
                        <th class="p-4">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbw2euz_kR7a554zK1_0Nj6Qbv4tDqLQGWgA0dcTXv8E6bdebHAjef9pUXzf241OVpDw/exec';

    async function send(idx) {
        if(!confirm("আপনি কি নিশ্চিত?")) return;
        
        // বাটন লোডিং স্টেট
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "আপডেট হচ্ছে...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({
                    action: "update", 
                    rowIndex: idx // এটি শিটের সঠিক রো নাম্বার পাঠাবে
                }) 
            });
            
            // সাময়িক বিরতি দিয়ে টেবিল রিফ্রেশ
            setTimeout(() => {
                load();
                alert("অর্ডার স্ট্যাটাস আপডেট করা হয়েছে।");
            }, 1500);

        } catch (error) {
            alert("সমস্যা হয়েছে!");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
    // load() ফাংশন আগের মতোই থাকবে।
</script>
</body>
</html>
