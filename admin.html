<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin - Bagan Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">অর্ডার ড্যাশবোর্ড</h1>
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-4">ক্রেতা/জেলা</th>
                        <th class="p-4">ঠিকানা</th>
                        <th class="p-4">পণ্য তথ্য</th>
                        <th class="p-4">ডেলিভারি ফি</th>
                        <th class="p-4 font-bold text-yellow-400">মোট টাকা</th>
                        <th class="p-4">স্ট্যাটাস</th>
                        <th class="p-4">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyExw2pj7YvFnnEFUaHLPf3mlkgFICpVkow-6hQcXQN5LgGG8CgAJq1SuAoQhNTznzwXw/exec';

        async function load() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const body = document.getElementById('tableBody');
            body.innerHTML = "";

            data.reverse().forEach(o => {
                const isSent = o.status === "পাঠানো হয়েছে";
                body.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4"><b>${o.name}</b><br><span class="text-blue-500 text-sm">${o.district}</span></td>
                        <td class="p-4 text-sm">${o.address}<br><b>${o.phone}</b></td>
                        <td class="p-4">প্যাকেট: ${o.quantity}</td>
                        <td class="p-4">৳${o.deliveryFee}</td>
                        <td class="p-4 font-bold text-green-700">৳${o.totalPrice}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-xs ${isSent ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">${o.status}</span></td>
                        <td class="p-4 text-center">
                            ${!isSent ? `<button onclick="send(${o.rowIndex})" class="bg-green-600 text-white px-3 py-1 rounded">পাঠানো হয়েছে?</button>` : '✅'}
                        </td>
                    </tr>`;
            });
        }

        async function send(idx) {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "update", rowIndex: idx}) });
            setTimeout(load, 2000);
        }
        load();
    </script>
</body>
</html>
